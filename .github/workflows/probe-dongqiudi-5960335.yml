name: Probe Dongqiudi Article 5960335

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - probes/dongqiudi-5960335.js
      - .github/workflows/probe-dongqiudi-5960335.yml

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Probe public article endpoints
        run: node probes/dongqiudi-5960335.js

      - name: Commit diagnostic report
        run: |
          git add -- debug/dongqiudi-5960335-probe.json
          if git diff --cached --quiet; then
            echo "Probe report unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "test: record Dongqiudi article endpoint probe"
          git pull --rebase --autostash origin "${{ github.ref_name }}"
          git push
