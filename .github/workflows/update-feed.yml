name: Update RSS Feeds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - generators/**
      - package.json
      - package-lock.json
      - .github/workflows/update-feed.yml
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: update-rss-feeds
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      MAX_ITEMS: "50"
      TIMEOUT_MS: "15000"
      RETRIES: "2"
      RETRY_BASE_DELAY_MS: "800"
      BRANCH: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check generator syntax
        run: npm test

      - name: Generate Xchuxing official feed
        env:
          SOURCE_URL: https://www.xchuxing.com/official
          SITE_URL: ${{ vars.XCHUXING_OFFICIAL_SITE_URL || vars.SITE_URL }}
          FEED_URL: ${{ vars.XCHUXING_OFFICIAL_FEED_URL || vars.FEED_URL }}
          OUTPUT_PATH: feeds/xchuxing/official.xml
        run: npm run generate:xchuxing:official

      - name: Generate Dongqiudi Barcelona team feed
        continue-on-error: true
        env:
          DONGQIUDI_TEAM_ID: "50001756"
          DONGQIUDI_TEAM_NAME: "巴塞罗那"
          SOURCE_URL: https://www.dongqiudi.com/team/50001756
          SITE_URL: https://www.dongqiudi.com/team/50001756
          FEED_URL: ${{ vars.DONGQIUDI_BARCELONA_FEED_URL }}
          OUTPUT_PATH: feeds/dongqiudi/team-50001756.xml
          STATE_PATH: state/dongqiudi/team-50001756.json
          FULL_CONTENT: "true"
          FULL_CONTENT_LIMIT: "12"
          ARTICLE_CONCURRENCY: "2"
          STATE_MAX_ARTICLES: "200"
        run: npm run generate:dongqiudi:team

      - name: Commit and push changed feeds and state
        run: |
          git add -A -- feeds/
          if [ -d state ]; then
            git add -A -- state/
          fi

          if git diff --cached --quiet; then
            echo "RSS feeds and state unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(rss): update feeds"

          # Rebase before pushing so two scheduled executions cannot race.
          git pull --rebase --autostash origin "$BRANCH"
          git push
